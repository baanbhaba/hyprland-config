# -----------------------------------------------------
# COLOR BLOCK THEME - Muted English Countryside
# -----------------------------------------------------

monitor=,highrr,auto,1

$terminal    = kitty
$fileManager = dolphin
$menu        = rofi -show drun -theme ~/.config/rofi/themes/colorblock.rasi
$run         = rofi -show run -theme ~/.config/rofi/themes/colorblock.rasi
$powermenu   = rofi -dmenu -p "Power Menu Search..." -theme ~/.config/rofi/themes/colorblock.rasi
$mainMod     = SUPER

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY
exec-once = systemctl --user start hyprpolkitagent
exec-once = waybar exec-once = waybar &
exec-once = mako &
exec-once = swayosd-server &                                         
exec-once = nm-applet --indicator &
exec-once = blueman-applet &
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = ~/.config/hypr/scripts/battery_check.sh &

device {
    name = synps/2-synaptics-touchpad
    sensitivity = -0.1
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = -0.7
    touchpad {
        natural_scroll = true
    }
}

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgb(c4a35a)    # Muted Mustard
    col.inactive_border = rgb(a89ab5)  # Muted Lavender
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 8
    active_opacity = 0.95
    inactive_opacity = 0.75
    
    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = rgba(2d2d2d33)
    }
    
    blur {
        enabled = true
        size = 2
        passes = 1
        new_optimizations = true
        xray = true
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 2, myBezier
    animation = windowsOut, 1, 2, default, popin 50%
    animation = border, 1, 2, default
    animation = fade, 1, 2, default
    animation = workspaces, 1, 2, default
}

windowrule {
    name = system_popups
    match:class = ^(nm-connection-editor|org.pulseaudio.pavucontrol|blueman-manager|pavucontrol)$
    float = true
    pin = true
    size = 400 500
    move = cursor -200 -250
}

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, W, killactive,
bind = $mainMod, M, exec, ~/.config/hypr/scripts/powermenu.sh
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, F, fullscreen,
bind = $mainMod, ESCAPE, exec, $menu
bind = $mainMod, R, exec, $run
bind = $mainMod, Z, fullscreenstate, 0, 1
bind = $mainMod, X, exec, ~/.local/bin/toggle-invert
bind = $mainMod SHIFT, T, exec, ~/.config/hypr/scripts/theme_switcher.sh

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindl  = , XF86AudioMute,        exec, swayosd-client --output-volume mute-toggle
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +'%Y-%m-%d-%H%M%S').png

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    background_color = 0xf0ebe3          # Warm Cream
    disable_splash_rendering = true
}

debug {
    vfr = true
}

dwindle {
    preserve_split = true
}

# Change Wallpaper
bind =  $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/wallpaper.sh
