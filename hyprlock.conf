$font = JetBrainsMono Nerd Font

general {
    hide_cursor = true
}

animations {
    enabled = true

    bezier = linear,1,1,0,0

    animation = fadeIn,1,5,linear
    animation = fadeOut,1,5,linear
    animation = inputFieldDots,1,2,linear
}

background {
    monitor =
    path = screenshot

    blur_passes = 5
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
}

label {
    monitor =

    text = cmd[update:1000] date +"%I:%M"
    font_family = $font
    font_size = 72
    color = rgba(ffffffff)

    position = 0, 110
    halign = center
    valign = center
}

input-field {
    monitor =

    size = 320, 60
    outline_thickness = 2

    outer_color = rgba(ffffffff)
    inner_color = rgba(00000055)

    font_color = rgba(ffffffff)
    placeholder_text = ******

    dots_size = 0.28
    dots_spacing = 0.35

    fade_on_empty = false
    rounding = 18

    font_family = $font

    position = 0, -20
    halign = center
    valign = center
}
